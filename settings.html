<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>設定｜シオンテクノス</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif; background: #f0f4f8; color: #1a2b3c; font-size: 14px; min-height: 100vh; }

.header {
  background: #0066cc; color: white;
  padding: 16px 20px;
  display: flex; align-items: center; gap: 12px;
  position: sticky; top: 0; z-index: 10;
}
.header .icon { font-size: 22px; }
.header .title { font-size: 15px; font-weight: 700; }
.header .sub { font-size: 11px; opacity: 0.8; }
.back-btn {
  margin-left: auto;
  background: rgba(255,255,255,0.2);
  border: 1px solid rgba(255,255,255,0.4);
  color: white; padding: 6px 14px;
  border-radius: 6px; font-size: 13px; cursor: pointer;
  text-decoration: none;
}

.container { max-width: 640px; margin: 0 auto; padding: 16px; }

.card {
  background: white; border-radius: 12px;
  padding: 18px; margin-bottom: 14px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.08);
}
.card-title {
  font-size: 12px; font-weight: 700;
  letter-spacing: 0.08em; color: #0066cc;
  border-bottom: 1px solid #e8f0f7;
  padding-bottom: 10px; margin-bottom: 14px;
  display: flex; align-items: center; gap: 6px;
}
.card-title .icon { font-size: 14px; }

.field { margin-bottom: 14px; }
.field label { display: block; font-size: 12px; color: #5a7a94; font-weight: 600; margin-bottom: 6px; }
.field input, .field textarea, .field select {
  width: 100%; padding: 10px 12px;
  border: 1.5px solid #d1dde8; border-radius: 8px;
  font-size: 14px; font-family: inherit; color: #1a2b3c;
  background: #f7fafc; outline: none;
  transition: border-color 0.15s;
}
.field input:focus, .field textarea:focus {
  border-color: #0066cc; background: white;
  box-shadow: 0 0 0 3px rgba(0,102,204,0.08);
}
.field textarea { resize: vertical; min-height: 72px; }
.field .hint { font-size: 11px; color: #8fa5b8; margin-top: 4px; }
.field .mono { font-family: monospace; font-size: 12px; }

.btn {
  display: block; width: 100%;
  padding: 12px; border: none; border-radius: 8px;
  font-size: 14px; font-weight: 700; cursor: pointer;
  font-family: inherit; transition: all 0.15s;
  text-align: center;
}
.btn-primary { background: #0066cc; color: white; }
.btn-primary:hover { background: #0052a3; }
.btn-danger { background: #e53e3e; color: white; margin-top: 8px; }
.btn-ghost { background: #f0f4f8; color: #5a7a94; border: 1.5px solid #d1dde8; }

.status-row {
  display: flex; align-items: center;
  justify-content: space-between;
  padding: 10px 0;
  border-bottom: 1px solid #f0f4f8;
}
.status-row:last-child { border-bottom: none; }
.status-label { font-size: 13px; color: #1a2b3c; }
.status-value { font-size: 12px; color: #5a7a94; font-family: monospace; }
.status-ok { color: #00a896; font-weight: 700; }
.status-ng { color: #e53e3e; font-weight: 700; }

.toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(10px);
  background: #1a2b3c; color: white;
  padding: 10px 20px; border-radius: 8px;
  font-size: 13px; font-weight: 500;
  opacity: 0; transition: all 0.25s; pointer-events: none;
  white-space: nowrap; z-index: 100;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.toast.success { background: #00a896; }
.toast.error { background: #e53e3e; }

.divider { height: 1px; background: #f0f4f8; margin: 8px 0; }

.version-badge {
  display: inline-block; background: #e6f0fb; color: #0066cc;
  padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 700;
}
</style>
</head>
<body>

<div class="header">
  <div class="icon">⚙️</div>
  <div>
    <div class="title">システム設定</div>
    <div class="sub">シオンテクノス 点検報告システム</div>
  </div>
  <a href="index.html" class="back-btn">← 戻る</a>
</div>

<div class="container">

  <!-- GAS URL設定 -->
  <div class="card">
    <div class="card-title"><span class="icon">🔗</span>GAS接続設定</div>
    <div class="field">
      <label>Google Apps Script URL</label>
      <input type="url" id="gas-url" class="mono" placeholder="https://script.google.com/macros/s/...">
      <div class="hint">GASをデプロイして発行されたウェブアプリURLを入力してください</div>
    </div>
    <button class="btn btn-primary" onclick="saveGasUrl()">💾 URLを保存</button>
    <button class="btn btn-ghost" style="margin-top:8px" onclick="testConnection()">🔍 接続テスト</button>
    <div id="test-result" style="margin-top:10px;font-size:12px;display:none;padding:8px 12px;border-radius:6px;"></div>
  </div>

  <!-- 接続状態 -->
  <div class="card">
    <div class="card-title"><span class="icon">📡</span>接続状態</div>
    <div id="conn-status">
      <div class="status-row">
        <span class="status-label">GAS URL</span>
        <span class="status-value" id="s-url">確認中…</span>
      </div>
      <div class="status-row">
        <span class="status-label">接続</span>
        <span id="s-conn">確認中…</span>
      </div>
      <div class="status-row">
        <span class="status-label">データ件数</span>
        <span id="s-count">—</span>
      </div>
    </div>
  </div>

  <!-- 会社情報 -->
  <div class="card">
    <div class="card-title"><span class="icon">🏢</span>会社情報</div>
    <div class="field">
      <label>会社名</label>
      <input type="text" id="company-name" value="シオンテクノス株式会社">
    </div>
    <div class="field">
      <label>本社住所・電話</label>
      <textarea id="company-info">札幌市東区北24条東4丁目1-1
電話 011-751-8686㈹　FAX 011-702-0070</textarea>
    </div>
    <button class="btn btn-primary" onclick="saveCompanyInfo()">💾 会社情報を保存</button>
    <div class="hint" style="margin-top:8px">※ 現在は帳票HTMLに直書きされています。変更後はprint.htmlも更新が必要です。</div>
  </div>

  <!-- キャッシュ・データ -->
  <div class="card">
    <div class="card-title"><span class="icon">🗄️</span>データ管理</div>
    <button class="btn btn-ghost" onclick="reloadData()">🔄 データを再読み込み</button>
    <button class="btn btn-ghost" style="margin-top:8px" onclick="clearCache()">🧹 キャッシュをクリア</button>
  </div>

  <!-- システム情報 -->
  <div class="card">
    <div class="card-title"><span class="icon">ℹ️</span>システム情報</div>
    <div class="status-row">
      <span class="status-label">バージョン</span>
      <span class="version-badge">v11</span>
    </div>
    <div class="status-row">
      <span class="status-label">ホスティング</span>
      <span class="status-value">GitHub Pages</span>
    </div>
    <div class="status-row">
      <span class="status-label">データベース</span>
      <span class="status-value">Google スプレッドシート</span>
    </div>
    <div class="status-row">
      <span class="status-label">API</span>
      <span class="status-value">Google Apps Script</span>
    </div>
  </div>

</div>

<div id="toast" class="toast"></div>

<script src="js/config.js"></script>
<script>
// ===== 初期化 =====
document.addEventListener('DOMContentLoaded', () => {
  // 現在のGAS URLを表示
  const currentUrl = typeof GAS_URL !== 'undefined' ? GAS_URL : '';
  document.getElementById('gas-url').value = currentUrl;

  // URLを短縮表示
  const urlEl = document.getElementById('s-url');
  if (currentUrl) {
    const short = currentUrl.replace('https://script.google.com/macros/s/', '').substring(0, 20) + '…';
    urlEl.textContent = short;
  } else {
    urlEl.textContent = '未設定';
    urlEl.className = 'status-value status-ng';
  }

  // 接続テスト
  checkConnection();
});

async function checkConnection() {
  const connEl = document.getElementById('s-conn');
  const countEl = document.getElementById('s-count');
  const url = typeof GAS_URL !== 'undefined' ? GAS_URL : '';
  if (!url) {
    connEl.innerHTML = '<span class="status-ng">未設定</span>';
    return;
  }
  try {
    const res = await fetch(url + '?action=list', { redirect: 'follow' });
    const json = await res.json();
    if (json.status === 'ok') {
      connEl.innerHTML = '<span class="status-ok">✓ 接続OK</span>';
      countEl.textContent = (json.data || []).length + ' 件';
    } else {
      connEl.innerHTML = '<span class="status-ng">✗ エラー</span>';
    }
  } catch(e) {
    connEl.innerHTML = '<span class="status-ng">✗ 接続失敗</span>';
    countEl.textContent = '—';
  }
}

// ===== GAS URL保存 =====
// ※ GitHub Pagesは静的ファイルのためconfig.jsを直接書き換えられません
// コピー用にURLを表示します
function saveGasUrl() {
  const url = document.getElementById('gas-url').value.trim();
  if (!url) { showToast('URLを入力してください', 'error'); return; }
  if (!url.startsWith('https://script.google.com')) {
    showToast('GASのURLを正しく入力してください', 'error'); return;
  }

  // クリップボードにコピー
  const configContent = `// ★ GASデプロイURLの設定ファイル\n// GASを再デプロイしてURLが変わった場合はここだけ更新してください\nconst GAS_URL = '${url}';\n`;
  navigator.clipboard.writeText(configContent).then(() => {
    showToast('js/config.js の内容をコピーしました！GitHubで更新してください', 'success');
  }).catch(() => {
    // フォールバック：テキストエリアで表示
    showCopyDialog(configContent);
  });
}

function showCopyDialog(text) {
  const div = document.createElement('div');
  div.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;';
  div.innerHTML = `
    <div style="background:white;border-radius:12px;padding:20px;width:100%;max-width:500px;">
      <div style="font-weight:700;margin-bottom:10px;">js/config.js の内容</div>
      <textarea style="width:100%;height:80px;font-family:monospace;font-size:12px;padding:8px;border:1px solid #ddd;border-radius:6px;" readonly>${text}</textarea>
      <div style="font-size:12px;color:#666;margin:8px 0;">上記をコピーして、GitHubの js/config.js に貼り付けてください</div>
      <button onclick="this.closest('div[style]').remove()" style="width:100%;padding:10px;background:#0066cc;color:white;border:none;border-radius:8px;font-size:14px;cursor:pointer;">閉じる</button>
    </div>`;
  document.body.appendChild(div);
}

// ===== 接続テスト =====
async function testConnection() {
  const url = document.getElementById('gas-url').value.trim();
  const resultEl = document.getElementById('test-result');
  resultEl.style.display = 'block';
  resultEl.style.background = '#f0f4f8';
  resultEl.textContent = '接続テスト中…';
  if (!url) { resultEl.textContent = 'URLを入力してください'; return; }
  try {
    const res = await fetch(url + '?action=list', { redirect: 'follow' });
    const json = await res.json();
    if (json.status === 'ok') {
      resultEl.style.background = '#e0f5f3';
      resultEl.innerHTML = '✓ 接続成功！データ ' + (json.data||[]).length + ' 件取得できました';
    } else {
      resultEl.style.background = '#fde8e8';
      resultEl.textContent = '✗ エラー: ' + (json.data?.message || '不明');
    }
  } catch(e) {
    resultEl.style.background = '#fde8e8';
    resultEl.textContent = '✗ 接続失敗: ' + e.message;
  }
}

function saveCompanyInfo() {
  showToast('会社情報はprint.htmlのHTMLを直接編集してください', '');
}

function reloadData() {
  showToast('メインページでリロードしてください', '');
  setTimeout(() => location.href = 'index.html', 1500);
}

function clearCache() {
  try {
    localStorage.clear();
    sessionStorage.clear();
  } catch(e) {}
  showToast('キャッシュをクリアしました', 'success');
}

function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (type ? ' ' + type : '');
  setTimeout(() => t.className = 'toast', 4000);
}
</script>
</body>
</html>
