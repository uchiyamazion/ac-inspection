<title>点検・作業報告書｜シオンテクノス</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif; background: #f0f4f8; color: #1a2b3c; font-size: 14px; }

.header {
  background: #0066cc; color: white;
  padding: 16px 20px;
  display: flex; align-items: center; gap: 12px;
  position: sticky; top: 0; z-index: 10;
}
.header .logo { font-size: 22px; }
.header .title { font-size: 15px; font-weight: 700; }
.header .sub { font-size: 11px; opacity: 0.8; }

.container { max-width: 640px; margin: 0 auto; padding: 16px; }

.card { background: white; border-radius: 10px; padding: 16px; margin-bottom: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
.card-title { font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: #0066cc; border-bottom: 1px solid #e8f0f7; padding-bottom: 8px; margin-bottom: 12px; }

.field { margin-bottom: 10px; }
.field-label { font-size: 11px; color: #8fa5b8; margin-bottom: 2px; }
.field-value { font-size: 14px; font-weight: 500; color: #1a2b3c; }
.field-value.mono { font-family: monospace; font-size: 13px; }
.field-value.text { white-space: pre-wrap; line-height: 1.6; font-weight: 400; }
.field-value.empty { color: #ccc; font-weight: 400; }

.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.grid4 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

.badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 700; }
.badge-完了 { background: #e0f5f3; color: #00a896; }
.badge-未完了 { background: #fef3cd; color: #d97706; }
.badge-見積書提出 { background: #fde8e8; color: #e53e3e; }

.parts-table { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 4px; }
.parts-table th { background: #e6f0fb; padding: 6px 8px; text-align: left; font-size: 11px; font-weight: 700; color: #5a7a94; }
.parts-table td { padding: 6px 8px; border-bottom: 1px solid #f0f4f8; }

.footer { text-align: center; padding: 24px 16px; color: #8fa5b8; font-size: 12px; }
@media print {
  .header button { display: none !important; }
  body { background: white; }
  @page { margin: 10mm; }
}
.footer .company { font-size: 15px; font-weight: 700; color: #0066cc; margin-bottom: 4px; }

.not-found { text-align: center; padding: 60px 20px; color: #8fa5b8; }
.not-found .icon { font-size: 48px; margin-bottom: 16px; }
</style>
</head>

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function val(v, mono) {
  if (v == null || v === '') return '<span class="field-value empty">—</span>';
  return '<span class="field-value' + (mono?' mono':'') + '">' + esc(v) + '</span>';
}
function field(label, v, mono) {
  return '<div class="field"><div class="field-label">' + esc(label) + '</div>' + val(v, mono) + '</div>';
}
function textField(label, v) {
  if (!v) return '';
  return '<div class="field"><div class="field-label">' + esc(label) + '</div><div class="field-value text">' + esc(v) + '</div></div>';
}
function formatDate(d) {
  if (!d) return '';
  const dt = new Date(d);
  return isNaN(dt) ? d : dt.getFullYear() + '年' + (dt.getMonth()+1) + '月' + dt.getDate() + '日';
}

function render(r) {
  const parts = Array.isArray(r.parts) ? r.parts.filter(p => p.name) : [];
  document.getElementById('content').innerHTML = `
    <div class="card">
      <div class="card-title">基本情報</div>
      <div class="grid2">
        ${field('お客様名', r.customerName)}
        ${field('ご依頼元', r.requester)}
      </div>
      ${field('ご住所', r.address)}
      ${field('受付内容', r.reception)}
    </div>

    <div class="card">
      <div class="card-title">機器情報</div>
      <div class="grid2">
        ${field('系統名 / 設置場所', r.systemName)}
        ${field('品種', r.productType)}
        ${field('メーカー', r.maker)}
        ${field('型式', r.model, true)}
        ${field('製番', r.serial, true)}
        ${field('使用冷媒', r.refrigerant)}
      </div>
    </div>

    <div class="card">
      <div class="card-title">作業情報</div>
      <div class="grid2">
        ${field('作業日', formatDate(r.workDate))}
        ${field('作業時間', r.workStart && r.workEnd ? r.workStart + ' 〜 ' + r.workEnd : '')}
      </div>
      ${textField('症状', r.symptom)}
      ${textField('原因', r.cause)}
      ${textField('作業内容', r.workContent)}
      ${textField('備考', r.remarks)}
    </div>

    ${(r.tempIndoorIn || r.tempIndoorOut || r.pressDischarge || r.pressSuction || r.tempDischarge || r.tempSuction || r.tempOutdoor || r.current) ? `
    <div class="card">
      <div class="card-title">運転データ</div>
      <div class="grid4">
        ${r.tempIndoorIn != null && r.tempIndoorIn !== '' ? field('室内吸入温', r.tempIndoorIn + ' ℃', true) : ''}
        ${r.tempIndoorOut != null && r.tempIndoorOut !== '' ? field('室内吹出温', r.tempIndoorOut + ' ℃', true) : ''}
        ${r.pressDischarge != null && r.pressDischarge !== '' ? field('吐出圧力', r.pressDischarge + ' MPa', true) : ''}
        ${r.pressSuction != null && r.pressSuction !== '' ? field('吸入圧力', r.pressSuction + ' MPa', true) : ''}
        ${r.tempDischarge != null && r.tempDischarge !== '' ? field('吐出温', r.tempDischarge + ' ℃', true) : ''}
        ${r.tempSuction != null && r.tempSuction !== '' ? field('吸入温', r.tempSuction + ' ℃', true) : ''}
        ${r.tempOutdoor != null && r.tempOutdoor !== '' ? field('外気温', r.tempOutdoor + ' ℃', true) : ''}
        ${r.current != null && r.current !== '' ? field('運転電流', r.current + ' A', true) : ''}
      </div>
    </div>` : ''}

    ${parts.length ? `
    <div class="card">
      <div class="card-title">使用部品</div>
      <table class="parts-table">
        <thead><tr><th>部品名</th><th>数量</th><th>単位</th><th>部品コード</th></tr></thead>
        <tbody>${parts.map(p => `<tr><td>${esc(p.name)}</td><td>${esc(p.qty)}</td><td>${esc(p.unit)}</td><td>${esc(p.code)}</td></tr>`).join('')}</tbody>
      </table>
    </div>` : ''}

    <div class="card">
      <div class="card-title">作業確認</div>
      <div class="grid2">
        <div class="field"><div class="field-label">ステータス</div><span class="badge badge-${esc(r.status)}">${esc(r.status||'—')}</span></div>
        ${field('作業者', r.worker)}
      </div>
    </div>
  `;
}

// GASからfetchで取得
async function loadReport() {
  if (!reportId) {
    document.getElementById('content').innerHTML = '<div class="not-found"><div class="icon">❌</div><p>報告書IDが指定されていません</p></div>';
    return;
  }
  try {
    const url = GAS_URL + '?action=get&id=' + encodeURIComponent(reportId);
    const res = await fetch(url, { redirect: 'follow' });
    const json = await res.json();
    if (json.status === 'error' || !json.data) {
      document.getElementById('content').innerHTML = '<div class="not-found"><div class="icon">❌</div><p>報告書が見つかりません</p></div>';
      return;
    }
    render(json.data);
  } catch(e) {
    document.getElementById('content').innerHTML = '<div class="not-found"><div class="icon">⚠️</div><p>読み込みに失敗しました</p></div>';
  }
}

loadReport();
</script>
</body>
</html>
